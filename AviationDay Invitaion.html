<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#021024,#052659,#5483B3);
        color:white;
    }

    .container{
        text-align:center;
        padding:30px;
        border-radius:20px;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(10px);
        box-shadow:0 0 25px rgba(84,131,179,0.4);
    }

    h1{
        margin-bottom:20px;
        font-size:2rem;
    }

    #countdown{
        display:flex;
        gap:15px;
        justify-content:center;
        flex-wrap:wrap;
    }

    .box{
        min-width:90px;
        padding:15px;
        border-radius:15px;
        background:rgba(255,255,255,0.12);
    }

    .number{
        font-size:2rem;
        font-weight:bold;
    }

    .label{
        font-size:0.9rem;
        opacity:0.8;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Countdown To Avionics '26 </h1>

    <div id="countdown">
        <div class="box">
            <div class="number" id="days">0</div>
            <div class="label">Days</div>
        </div>

        <div class="box">
            <div class="number" id="hours">0</div>
            <div class="label">Hours</div>
        </div>

        <div class="box">
            <div class="number" id="minutes">0</div>
            <div class="label">Minutes</div>
        </div>

        <div class="box">
            <div class="number" id="seconds">0</div>
            <div class="label">Seconds</div>
        </div>
    </div>
</div>

<script>
const targetDate = new Date("June 11, 2026 13:30:00").getTime();

function updateCountdown() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;

    if (distance < 0) {
        document.querySelector(".container").innerHTML =
            "<h1>The Day Has Arrived 🎉</h1>";
    }
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
